[mypy]
# Строгий режим — как в Swift
strict = True

# Дополнительные строгие настройки
warn_return_any = True
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True

# Показывать контекст ошибок
show_error_context = True
show_column_numbers = True
show_error_codes = True

# Игнорировать отсутствующие импорты для сторонних библиотек
ignore_missing_imports = True

# Исключения для конкретных файлов
[mypy-src.infrastructure.ai.analysis.*]
disallow_any_explicit = False

# Проверка декораторов
check_untyped_defs = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
disallow_untyped_decorators = True

# Запрет Any
disallow_any_generics = True
disallow_subclassing_any = True

# Инициализация
no_implicit_optional = True
no_implicit_reexport = True

# Ковариантность
